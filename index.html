<!-- index.html (Retro Revival wrapper) -->
<!--
  Full-screen wrapper that embeds the Retro Revival Apps Script web app in an
  iframe. Google injects a "This application was created by a Google Apps Script
  user" banner on the outer script.google.com page; embedding the /exec URL here
  hides that banner.

  Includes a custom PULL-TO-REFRESH plus AUTO-REFRESH:
  - Pull down from the top to manually refresh (fills a spinner, then reloads).
  - Auto-refresh when the app returns to the foreground (relaunch or app-switch)
    after more than a few seconds away, so it always shows current data.
  - Auto-refresh if the session has been open/idle for 30+ minutes, on return.
  We can only reload the iframe, not read scrolling inside it, because the app is
  on a different domain.

  SETUP:
  1. This embeds the /exec URL. The /dev URL does NOT work inside a cross-origin
     iframe — Google blocks it. So the iframe must use /exec. Updates appear
     after you publish a new deployment version
     (Deploy > Manage deployments > edit > new version), and after the user
     pulls to refresh (or relaunches) the app.
  2. Host this file on GitHub Pages (assets repo as retro/index.html), then open
     the GitHub Pages URL instead of the script.google.com URL.
-->
<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">

    <!-- Discourage caching so updates to this wrapper show up without having to
         clear Safari's cache. (The home-screen standalone app caches the HTML
         aggressively; these tell it to always revalidate.) -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">

    <title>Retro Revival Inventory</title>

    <!-- Favicon (browser tab) -->
    <link rel="icon" href="https://chrisl18rel.github.io/assets/retro-revival-icon-180.png">

    <!-- Home-screen icon for iPhone/iPad "Add to Home Screen" -->
    <link rel="apple-touch-icon" href="https://chrisl18rel.github.io/assets/retro-revival-icon-180.png">
    <link rel="apple-touch-icon" sizes="152x152" href="https://chrisl18rel.github.io/assets/retro-revival-icon-152.png">
    <link rel="apple-touch-icon" sizes="180x180" href="https://chrisl18rel.github.io/assets/retro-revival-icon-180.png">

    <!-- Launch full-screen (no Safari chrome) when opened from the home screen -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Retro Revival">
    <style>
      :root {
        --teal: #76B6B3;
        --teal-deep: #4E9798;
        --cream: #FFF0CB;
        --ink: #000D12;
      }
      html, body {
        margin: 0;
        padding: 0;
        height: 100%;
        background: var(--cream);
        overflow: hidden;
      }
      /* The iframe fills the entire viewport with no chrome of its own. */
      #appFrame {
        position: fixed;
        inset: 0;
        width: 100%;
        height: 100%;
        border: 0;
        display: block;
      }
      /* Centered loading note shown until the iframe paints over it. Uses an
         explicit dvh height (not inset:0) so it has a stable size on first paint
         and the centered text doesn't start off-center then jump to center as
         the viewport finalizes. */
      #loading {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100vh;
        height: 100dvh;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        color: var(--teal-deep);
        font-size: 16px;
        letter-spacing: 0.04em;
        background: var(--cream);
        z-index: 5;
      }

      /* ===== Pull-to-refresh ===== */
      /* A strip across the top that catches the pull gesture. It MUST stay
         pointer-active (a cross-origin iframe swallows touches, so the only
         touches we can read land on this overlay above the iframe).
         It starts BELOW the status bar / system-gesture edge (top ~44px owns
         Control Center & Notification Center) and is tall enough (down to
         ~190px) to be an easy target over the app's banner. While a pull is in
         progress JS expands it full-screen so the drag keeps registering. */
      #ptrZone {
        position: fixed;
        top: env(safe-area-inset-top, 44px);
        left: 0;
        right: 0;
        height: 95px;
        z-index: 10;
        background: transparent;
      }
      #ptrZone.expanded { top: 0; bottom: 0; height: auto; }
      /* The spinner indicator that descends from the top as you pull. */
      #ptrIndicator {
        position: fixed;
        top: 0;
        left: 50%;
        transform: translate(-50%, -54px);
        width: 44px;
        height: 44px;
        z-index: 11;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        border-radius: 50%;
        box-shadow: 0 2px 10px rgba(0,13,18,0.18);
        opacity: 0;
      }
      #ptrIndicator svg { width: 26px; height: 26px; display: block; }
      /* The progress ring arc that "fills in" as you pull. */
      #ptrArc {
        fill: none;
        stroke: var(--teal-deep);
        stroke-width: 4;
        stroke-linecap: round;
        transform: rotate(-90deg);
        transform-origin: 50% 50%;
      }
      #ptrTrack {
        fill: none;
        stroke: rgba(78,151,152,0.18);
        stroke-width: 4;
      }
      /* When actively refreshing, the whole indicator spins. */
      #ptrIndicator.spinning { animation: ptrSpin 0.8s linear infinite; }
      @keyframes ptrSpin { to { transform: translate(-50%, 70px) rotate(360deg); } }
    </style>
  </head>
  <body>
    <div id="loading">Loading Retro Revival Inventory… <span style="opacity:0.7;">v.1.4</span></div>

    <!-- Pull-to-refresh gesture catcher + indicator -->
    <div id="ptrZone"></div>
    <div id="ptrIndicator">
      <svg viewBox="0 0 44 44" aria-hidden="true">
        <circle id="ptrTrack" cx="22" cy="22" r="18"></circle>
        <circle id="ptrArc" cx="22" cy="22" r="18"></circle>
      </svg>
    </div>

    <iframe
      id="appFrame"
      title="Retro Revival Inventory"
      src="https://script.google.com/macros/s/AKfycbz7NawIYpc72UsfWvm8Tz0I77UTHx5ane3iV22oQAlG1Lh0olmscrmtPttxCyYaCUhfcw/exec"
      allow="clipboard-read; clipboard-write"
      onload="document.getElementById('loading').style.display='none';"></iframe>

    <script>
      (function () {
        // Only enable pull-to-refresh and auto-refresh on touch devices
        // (iPhone/iPad). On a desktop browser none of this runs, so switching
        // tabs/windows never triggers a reload and there is no pull gesture.
        var isTouchDevice = ('ontouchstart' in window) || navigator.maxTouchPoints > 0;
        if (!isTouchDevice) {
          // Desktop: hide the pull indicator/zone and do nothing else.
          var z = document.getElementById('ptrZone');
          var ind = document.getElementById('ptrIndicator');
          if (z) z.style.display = 'none';
          if (ind) ind.style.display = 'none';
          return;
        }

        var frame = document.getElementById('appFrame');
        var zone = document.getElementById('ptrZone');
        var indicator = document.getElementById('ptrIndicator');
        var arc = document.getElementById('ptrArc');

        // Circle circumference for the progress arc (r = 18).
        var CIRC = 2 * Math.PI * 18;
        arc.style.strokeDasharray = CIRC;
        arc.style.strokeDashoffset = CIRC; // start empty

        var THRESHOLD = 80;   // px of pull needed to trigger a refresh
        var MAX_PULL = 110;   // px where the indicator is fully down
        var startY = null;
        var pulling = false;
        var refreshing = false;

        function setProgress(p) {
          // p is 0..1; fill the arc and slide the indicator down.
          if (p < 0) p = 0;
          if (p > 1) p = 1;
          arc.style.strokeDashoffset = CIRC * (1 - p);
          indicator.style.opacity = p > 0.02 ? 1 : 0;
          var drop = -54 + p * (70 + 54); // from hidden (-54) toward 70px down
          indicator.style.transform = 'translate(-50%, ' + drop + 'px)';
        }

        function reset() {
          indicator.classList.remove('spinning');
          indicator.style.transition = 'transform 0.25s ease, opacity 0.25s ease';
          setProgress(0);
          setTimeout(function () { indicator.style.transition = ''; }, 260);
        }

        function doRefresh() {
          refreshing = true;
          indicator.style.transition = '';
          // Lock the indicator at the top-spin position and spin it.
          arc.style.strokeDashoffset = CIRC * 0.25; // a partial arc looks like a spinner
          indicator.style.opacity = 1;
          indicator.classList.add('spinning');
          // Reload the app inside the iframe to fetch the latest data.
          try {
            frame.src = frame.src;
          } catch (e) {
            window.location.reload();
          }
          // When the iframe finishes loading, stop the spinner.
          frame.addEventListener('load', function onLoad() {
            frame.removeEventListener('load', onLoad);
            refreshing = false;
            reset();
          });
          // Safety: stop spinning after 8s even if load doesn't fire.
          setTimeout(function () {
            if (refreshing) { refreshing = false; reset(); }
          }, 8000);
        }

        // Touch handlers live on the #ptrZone overlay strip, NOT the body — a
        // cross-origin iframe swallows touches, so the only touches we can read
        // are ones landing on this strip above the iframe. The strip is thin
        // (top 70px); once a pull starts we expand it full-screen so the drag
        // keeps registering as the finger moves down.
        zone.addEventListener('touchstart', function (e) {
          if (refreshing) return;
          if (e.touches.length !== 1) return;
          startY = e.touches[0].clientY;
          pulling = false;
        }, { passive: true });

        zone.addEventListener('touchmove', function (e) {
          if (refreshing || startY === null) return;
          var dy = e.touches[0].clientY - startY;
          if (dy > 0) {
            if (!pulling) {
              pulling = true;
              zone.classList.add('expanded'); // cover screen so drag continues
            }
            var eff = Math.min(dy, MAX_PULL);
            setProgress(eff / THRESHOLD);
            if (e.cancelable) e.preventDefault();
          }
        }, { passive: false });

        function endPull() {
          if (refreshing) return;
          zone.classList.remove('expanded');
          if (pulling) {
            var offset = parseFloat(arc.style.strokeDashoffset);
            var progress = 1 - (offset / CIRC);
            if (progress >= 1) {
              doRefresh();
            } else {
              reset();
            }
          }
          startY = null;
          pulling = false;
        }
        zone.addEventListener('touchend', endPull, { passive: true });
        zone.addEventListener('touchcancel', endPull, { passive: true });

        // ===== Auto-refresh: foreground return + idle timeout =====
        // Reload the app's data when the user comes back to it, so a relaunch or
        // returning from another app always shows current information, and a
        // session left idle for a while is never stale.
        var IDLE_MS = 30 * 60 * 1000;     // refresh if away/idle 30+ minutes
        var QUICK_GLANCE_MS = 3 * 1000;   // ignore very brief app-switches
        var hiddenAt = null;
        var lastRefresh = Date.now();

        function maybeRefreshOnReturn() {
          if (refreshing) return;
          var now = Date.now();
          var awayFor = hiddenAt ? (now - hiddenAt) : 0;
          var sinceRefresh = now - lastRefresh;

          // Refresh if: returned after being away more than a quick glance,
          // OR the session has simply been open/idle past the idle threshold.
          if (awayFor > QUICK_GLANCE_MS || sinceRefresh > IDLE_MS) {
            lastRefresh = now;
            doRefresh();
          }
        }

        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'hidden') {
            hiddenAt = Date.now();
          } else if (document.visibilityState === 'visible') {
            maybeRefreshOnReturn();
            hiddenAt = null;
          }
        });

        // iOS standalone apps fire pageshow on resume; covers cases where
        // visibilitychange doesn't reliably fire.
        window.addEventListener('pageshow', function (e) {
          if (e.persisted) maybeRefreshOnReturn();
        });

        // Keep lastRefresh current whenever a manual pull-to-refresh happens too,
        // so the idle timer measures from the most recent actual reload.
        frame.addEventListener('load', function () { lastRefresh = Date.now(); });
      })();
    </script>
  </body>
</html>
